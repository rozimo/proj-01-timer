<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Timer</title>
    <link rel="stylesheet" href="index.css" />
    <script defer scr="renderer.js"></script>
  </head>
  <body>
    <div class="appWindowContainer">
        <img src="../assets/images/appWindow.PNG" class="windowLayout">

        <h1 id="timerTitle">Rice Timer</h1>

        <div class="appWindowControlsContainer">
            <button id="hideButton" class="appWindowControls">
                <img src="../assets/images/hideButton.PNG">
            </button>
            <button id="exitButton" class="appWindowControls">
                <img src="../assets/images/exitButton.PNG">
            </button>
        </div>

        <div class="onigiriContainer">
            <img src="../assets/images/onigiriTimer.PNG">
        </div>

        <div class="userInputContainer">
            <!--User need to input number of hours, minutes, and seconds-->
            <input class="timeMetrics" type="number" id="hours" placeholder="00" min="00" max="99">
            <span class="timeColon">:</span>
            <input class="timeMetrics" type="number" id="minutes" placeholder="00" min="00" max="60">
            <span class="timeColon">: </span>
            <input class="timeMetrics" type="number" id="seconds" placeholder="00" min="00" max="60">
        </div>

        <div class="timerButtonsContainer">
            <!--Timer's buttons-->
            <button id="startButton" class="timerButtons">
                <span>Start</span>
                <img src="../assets/images/startEndButton.PNG" id="startButtonImage" alt="Start timer">
            </button>
            <button id="endButton" class="timerButtons">
                <span>End</span>
                <img src="../assets/images/startEndButton.PNG" id="endButtonImage" alt="Stop timer">
            </button>
        </div>

    </div>
  </body>
</html>
